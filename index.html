<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>the rooms</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
@font-face {
  font-family: 'Galmuri11';
  src: url('fonts/Galmuri11.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #060604;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Galmuri11', monospace, sans-serif;
}
#wrap { position: relative; line-height: 0; }
#screen {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  display: block;
  width: min(960px, 100vw);
  height: auto;
  background: #000;
  cursor: crosshair;
}
#overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(2, 2, 0, 0.55);
  line-height: 1.6;
  z-index: 10;
}
#overlay.hidden { display: none; }
.box {
  max-width: 620px;
  padding: 28px 36px;
  text-align: center;
  color: #d8cc8a;
  text-shadow: 0 0 8px rgba(216, 204, 138, 0.35);
}
.t-pre {
  font-size: 15px; letter-spacing: 8px; color: #8a7f4e; margin-bottom: 6px;
}
.t-main {
  font-size: 64px; margin: 0; letter-spacing: 6px; color: #e8da8f;
  animation: flicker 4.2s infinite;
  text-shadow: 0 0 18px rgba(232, 218, 143, 0.5), 0 0 50px rgba(232, 218, 143, 0.18);
}
.t-keys { font-size: 12px; color: #6e6440; margin-top: 18px; line-height: 1.8; }
.mobile-keys { display: none; }
.t-credit { font-size: 11px; color: #4e492f; margin-top: 12px; letter-spacing: 2px; }
button {
  font-family: inherit;
  font-size: 18px;
  color: #ffefa8;
  background: rgba(40, 36, 14, 0.85);
  border: 2px solid #8a7f4e;
  padding: 12px 34px;
  cursor: pointer;
  letter-spacing: 3px;
  box-shadow: 0 0 14px rgba(216, 204, 138, 0.2);
  transition: background 0.15s, box-shadow 0.15s;
}
button:hover {
  background: rgba(78, 70, 26, 0.9);
  box-shadow: 0 0 24px rgba(255, 239, 168, 0.45);
  animation: flicker 0.8s infinite;
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  3% { opacity: 0.55; }
  6% { opacity: 1; }
  7% { opacity: 0.3; }
  9% { opacity: 1; }
  42% { opacity: 1; }
  44% { opacity: 0.72; }
  46% { opacity: 1; }
}
.note-box {
  max-width: 480px;
  background: linear-gradient(168deg, #efe6c4 0%, #e0d4a8 60%, #cfc190 100%);
  color: #3a3322;
  padding: 30px 36px 24px;
  transform: rotate(-1.2deg);
  box-shadow: 0 14px 50px rgba(0,0,0,0.85), inset 0 0 60px rgba(110, 95, 50, 0.25);
  text-align: left;
  border: 1px solid #b3a574;
}
.note-head {
  font-size: 14px; color: #7a6c42; letter-spacing: 4px;
  border-bottom: 1px dashed #a4956a; padding-bottom: 8px; margin-bottom: 14px;
}
.note-body { font-size: 16px; line-height: 2.0; white-space: pre-line; }
.note-box button {
  margin-top: 18px; font-size: 14px; padding: 8px 22px;
  color: #4a4128; background: rgba(255,255,255,0.25); border-color: #8a7c52;
  box-shadow: none;
}
.note-box button:hover { background: rgba(255,255,255,0.5); animation: none; }
.btn-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
button.ghost {
  color: #8a7f4e; border-color: #55502f; box-shadow: none; font-size: 15px;
}
.zone-card .t-pre { animation: flicker 3s infinite; }
.end-title { font-size: 38px; margin: 0 0 14px; letter-spacing: 4px; }
.end-title.red { color: #c84a3a; text-shadow: 0 0 16px rgba(200, 74, 58, 0.6); animation: flicker 2.6s infinite; }
.end-title.green { color: #b6d89a; text-shadow: 0 0 16px rgba(182, 216, 154, 0.5); }
.end-title.shatter { color: #8c1d16; text-shadow: 0 0 18px rgba(160, 20, 14, 0.7), 0 0 40px rgba(120,10,8,0.4); animation: flicker 1.8s infinite; }
.end-story { font-size: 15px; color: #b9ad77; line-height: 2.0; margin-bottom: 18px; }
.end-stats { font-size: 13px; color: #8a7f4e; margin-bottom: 24px; line-height: 1.9; }

/* ---- 캐릭터 커스터마이징 ---- */
.look-box { max-width: 480px; }
#look-prev {
  image-rendering: pixelated; image-rendering: crisp-edges;
  display: block; margin: 0 auto 6px;
  background: radial-gradient(circle at 50% 42%, rgba(60,64,40,0.5), rgba(4,4,2,0.85) 70%);
  border: 1px solid #55502f;
}
.look-name { font-size: 13px; color: #c9bd86; letter-spacing: 1px; margin-bottom: 16px; min-height: 16px; }
.look-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
.look-lab { font-size: 13px; color: #8a7f4e; letter-spacing: 3px; width: 44px; text-align: right; }
.look-sw { display: flex; gap: 6px; flex-wrap: wrap; }
.swatch {
  width: 26px; height: 26px; padding: 0; min-width: 0;
  border: 2px solid #55502f; border-radius: 4px; cursor: pointer;
  box-shadow: none; letter-spacing: 0; transition: transform 0.1s, border-color 0.1s;
}
.swatch:hover { transform: scale(1.12); animation: none; border-color: #b3a574; box-shadow: 0 0 8px rgba(216,204,138,0.4); }
.swatch.sel { border-color: #ffe9a0; box-shadow: 0 0 10px rgba(255,233,160,0.7); transform: scale(1.12); }
.look-box button#btn-look-go { margin-top: 18px; font-size: 16px; padding: 10px 26px; }

/* ---- 인트로 컷신 ---- */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px) scale(0.98) rotate(var(--rot, 0deg)); }
  to { opacity: 1; transform: translateY(0) scale(1) rotate(var(--rot, 0deg)); }
}
.news {
  --rot: -0.8deg;
  max-width: 580px;
  background: #d2ccba;
  color: #1a1813;
  padding: 26px 34px 30px;
  text-align: left;
  box-shadow: 0 18px 60px rgba(0,0,0,0.9), inset 0 0 80px rgba(120,110,80,0.15);
  border: 1px solid #8f897a;
  transform: rotate(-0.8deg);
  animation: cardIn 0.7s ease both;
  filter: contrast(1.05) sepia(0.12);
}
.news-tag {
  font-size: 12px; letter-spacing: 4px; color: #7a2218; font-weight: bold;
  border-bottom: 3px double #1a1813; padding-bottom: 7px; margin-bottom: 12px;
  display: flex; justify-content: space-between;
}
.news-head { font-size: 25px; margin: 10px 0 14px; line-height: 1.45; color: #16140f; }
.news-body { font-size: 14px; line-height: 1.95; color: #2c281d; }
.news-body b { color: #7a2218; }
.news-date { font-size: 11px; color: #6a6052; margin-top: 16px; font-style: italic; }
.cut-mono {
  max-width: 600px; text-align: center; color: #c9bd86;
  font-size: 19px; line-height: 2.1; letter-spacing: 1px;
  animation: cardIn 1.0s ease both;
  text-shadow: 0 0 12px rgba(201,189,134,0.3);
}
.cut-mono .small { font-size: 14px; color: #8a7f4e; }
.skip-hint {
  position: absolute; bottom: 18px; right: 26px;
  font-size: 12px; color: #5a5436; letter-spacing: 2px;
  animation: flicker 3s infinite;
}

/* ---- 모바일 터치 조작 ---- */
#mobile-controls {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 12;
  pointer-events: none;
  transition: opacity 0.15s ease;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
#overlay:not(.hidden) + #mobile-controls {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.touch-dpad {
  position: absolute;
  left: max(12px, env(safe-area-inset-left));
  bottom: max(18px, env(safe-area-inset-bottom));
  display: grid;
  grid-template-areas: ". up ." "left . right" ". down .";
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 3px;
  pointer-events: none;
}
.touch-actions {
  position: absolute;
  right: max(12px, env(safe-area-inset-right));
  bottom: max(18px, env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: repeat(3, 54px);
  grid-template-rows: repeat(2, 54px);
  gap: 8px;
  align-items: center;
  justify-items: center;
  pointer-events: none;
}
.touch-utility {
  position: absolute;
  top: max(9px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  pointer-events: none;
}
#mobile-controls .touch-button {
  width: 50px;
  height: 50px;
  min-width: 0;
  margin: 0;
  padding: 0;
  border: 1px solid rgba(232, 218, 143, 0.62);
  border-radius: 50%;
  background: rgba(15, 14, 8, 0.58);
  color: #f0dfa0;
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45), inset 0 0 14px rgba(216, 204, 138, 0.08);
  text-shadow: 0 1px 3px #000;
  letter-spacing: 0;
  line-height: 1;
  touch-action: none;
  pointer-events: auto;
  opacity: 0.78;
}
#mobile-controls .touch-button:hover {
  background: rgba(15, 14, 8, 0.58);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45), inset 0 0 14px rgba(216, 204, 138, 0.08);
  animation: none;
}
#mobile-controls .touch-button.pressed {
  opacity: 1;
  color: #fff2b6;
  background: rgba(92, 78, 28, 0.82);
  border-color: #fff0a6;
  box-shadow: 0 0 18px rgba(255, 232, 145, 0.34), inset 0 0 12px rgba(255, 241, 176, 0.18);
  transform: scale(0.94);
}
#mobile-controls .touch-button b {
  display: block;
  font-size: 17px;
  font-weight: normal;
  line-height: 17px;
}
#mobile-controls .touch-button span {
  display: block;
  margin-top: 3px;
  font-size: 8px;
  line-height: 9px;
  letter-spacing: 0;
}
#mobile-controls .touch-dir {
  width: 52px;
  height: 52px;
  font-size: 24px;
}
.touch-up { grid-area: up; }
.touch-left { grid-area: left; }
.touch-right { grid-area: right; }
.touch-down { grid-area: down; }
#mobile-controls .touch-interact {
  width: 58px;
  height: 58px;
  border-color: rgba(255, 235, 151, 0.88);
  background: rgba(65, 56, 20, 0.72);
}
#mobile-controls .touch-small {
  width: 38px;
  height: 38px;
  font-size: 13px;
  background: rgba(10, 10, 7, 0.62);
}
#orientation-gate {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 30;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(3, 3, 1, 0.96);
  color: #d8cc8a;
  line-height: 1.6;
  text-align: center;
  pointer-events: auto;
}
.orientation-mark {
  width: 82px;
  height: 46px;
  margin: 0 auto 22px;
  border: 2px solid #8a7f4e;
  border-radius: 7px;
  box-shadow: 0 0 22px rgba(216, 204, 138, 0.16), inset 0 0 18px rgba(216, 204, 138, 0.08);
  position: relative;
}
.orientation-mark::after {
  content: '';
  position: absolute;
  width: 4px;
  height: 4px;
  right: 5px;
  top: 19px;
  border-radius: 50%;
  background: #d8cc8a;
}
.orientation-title { font-size: 20px; letter-spacing: 2px; }
.orientation-copy { margin-top: 8px; color: #6e6440; font-size: 11px; letter-spacing: 1px; }

@media (pointer: coarse), (max-width: 760px) {
  html, body {
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    align-items: flex-start;
    touch-action: none;
  }
  #wrap {
    width: 100vw;
    height: 100dvh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
  }
  #screen {
    width: 100vw;
    max-width: 960px;
    height: auto;
    max-height: 100dvh;
    object-fit: contain;
    cursor: default;
  }
  #overlay {
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
      max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    overflow: hidden;
  }
  .box, .news, .note-box, .cut-mono {
    max-width: min(92vw, 620px);
    max-height: calc(100dvh - 24px);
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .box { padding: 20px 18px; }
  .t-pre { font-size: 11px; letter-spacing: 4px; }
  .t-main { font-size: 43px; letter-spacing: 3px; }
  .desktop-keys { display: none; }
  .mobile-keys { display: block; }
  .t-keys { margin-top: 13px; font-size: 10px; line-height: 1.75; }
  .end-title { font-size: 29px; letter-spacing: 2px; }
  .end-story { font-size: 13px; line-height: 1.75; }
  .end-stats { font-size: 11px; line-height: 1.75; }
  .news { padding: 20px 20px 24px; }
  .news-head { font-size: 20px; }
  .news-body { font-size: 12px; line-height: 1.75; }
  .note-box { padding: 22px 22px 18px; }
  .note-body { font-size: 14px; line-height: 1.8; }
  .cut-mono { font-size: 16px; line-height: 1.85; padding: 16px; }
  .skip-hint { bottom: max(10px, env(safe-area-inset-bottom)); right: 14px; font-size: 10px; }
  #mobile-controls { display: block; }
}

@media (pointer: coarse) and (orientation: landscape), (max-width: 760px) and (orientation: landscape) {
  #wrap { align-items: center; }
  #screen {
    width: min(100vw, calc(100dvh * 1.5385));
    height: min(100dvh, calc(100vw / 1.5385));
  }
  .touch-dpad {
    grid-template-columns: repeat(3, 47px);
    grid-template-rows: repeat(3, 47px);
  }
  #mobile-controls .touch-dir { width: 47px; height: 47px; }
  .touch-actions {
    grid-template-columns: repeat(3, 49px);
    grid-template-rows: repeat(2, 49px);
    gap: 6px;
  }
  #mobile-controls .touch-button { width: 46px; height: 46px; }
  #mobile-controls .touch-interact { width: 52px; height: 52px; }
  #mobile-controls .touch-small { width: 34px; height: 34px; }
}

@media (pointer: coarse) and (orientation: portrait), (max-width: 760px) and (orientation: portrait) {
  #mobile-controls { display: none; }
  #orientation-gate { display: flex; }
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="screen" width="960" height="624"></canvas>
  <div id="overlay" class="hidden"></div>
  <div id="mobile-controls" aria-label="모바일 게임 조작">
    <div class="touch-utility">
      <button type="button" class="touch-button touch-small" data-touch-key="m" aria-label="음소거">M</button>
      <button type="button" class="touch-button touch-small" data-touch-key="escape" aria-label="일시정지">II</button>
    </div>
    <div class="touch-dpad" aria-label="이동 방향">
      <button type="button" class="touch-button touch-dir touch-up" data-touch-key="w" aria-label="위로 이동">↑</button>
      <button type="button" class="touch-button touch-dir touch-left" data-touch-key="a" aria-label="왼쪽으로 이동">←</button>
      <button type="button" class="touch-button touch-dir touch-right" data-touch-key="d" aria-label="오른쪽으로 이동">→</button>
      <button type="button" class="touch-button touch-dir touch-down" data-touch-key="s" aria-label="아래로 이동">↓</button>
    </div>
    <div class="touch-actions" aria-label="게임 행동">
      <button type="button" class="touch-button" data-touch-key="shift" aria-label="달리기"><b>R</b><span>달리기</span></button>
      <button type="button" class="touch-button" data-touch-key="q" aria-label="돌 던지기"><b>Q</b><span>돌</span></button>
      <button type="button" class="touch-button touch-interact" data-touch-key="e" aria-label="상호작용"><b>E</b><span>행동</span></button>
      <button type="button" class="touch-button" data-touch-key="h" aria-label="아몬드 워터 마시기"><b>H</b><span>마시기</span></button>
      <button type="button" class="touch-button" data-touch-key="g" aria-label="아몬드 워터 던지기"><b>G</b><span>던지기</span></button>
    </div>
  </div>
  <div id="orientation-gate" role="status" aria-live="polite" aria-hidden="true">
    <div>
      <div class="orientation-mark" aria-hidden="true"></div>
      <div class="orientation-title">기기를 가로로 돌려주세요</div>
      <div class="orientation-copy">가로 화면에서 플레이할 수 있습니다.</div>
    </div>
  </div>
</div>
<script src="js/util.js?v=30"></script>
<script src="js/assets.js?v=30"></script>
<script src="js/audio.js?v=30"></script>
<script src="js/map.js?v=30"></script>
<script src="js/actors.js?v=30"></script>
<script src="js/fx.js?v=30"></script>
<script src="js/main.js?v=30"></script>
</body>
</html>
